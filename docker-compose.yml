services:
  backend:
    build: ./backend
    container_name: drip-backend
    env_file: ./backend/.env
    environment:
      # Scheduler runs in local time - set your timezone here
      TZ: Europe/Berlin
    volumes:
      - drip-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: drip-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  drip-data:
